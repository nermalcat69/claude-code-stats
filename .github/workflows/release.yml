name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binaries
        run: |
          cd backend
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/claude-stats-macos-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/claude-stats-macos-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/claude-stats-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/claude-stats-windows-amd64.exe .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
